generation:
  provider: deepseek          # openai-compatible API
  base_url: "https://api.deepseek.com/v1"
  api_key_env: DEEPSEEK_API_KEY
  model: deepseek-chat
  max_tokens: 400
  temperature: 0.7
  concurrency: 5              # async semaphore limit
  batch_size: 10
  retry_attempts: 3
  retry_wait_seconds: 2

extraction:
  provider: deepseek
  base_url: "https://api.deepseek.com/v1"
  api_key_env: DEEPSEEK_API_KEY
  model: deepseek-chat
  max_tokens: 800
  temperature: 0.0            # deterministic for extraction
  concurrency: 5
  retry_attempts: 3
  retry_wait_seconds: 2

paths:
  raw_data: data/raw/heart_918.csv
  processed_data: data/processed/heart_processed.csv
  notes_output: data/notes/generated_notes.jsonl
  extraction_output: data/extracted/extracted_structured.jsonl
  noisy_dir: data/noisy/

noise_levels: [0.0, 0.05, 0.10, 0.20, 0.30]
random_seed: 42
